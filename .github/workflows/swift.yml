
name: Swift Tests
 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  test:
    name: Build & Test (macOS)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5
 
      - name: List available Xcode versions
        run: ls /Applications | grep -i xcode
 
      - name: Select newest installed Xcode
        run: |
          NEWEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          echo "Selecting: $NEWEST"
          sudo xcode-select -s "$NEWEST/Contents/Developer"
 
      - name: Show Swift version
        run: swift --version
 
      - name: Build
        run: swift build -v
 
      - name: Run tests
        run: swift test -v
 
